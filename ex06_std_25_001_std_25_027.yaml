openapi: 3.0.3
info:
  title: API Bibliotheque HEI
  version: 1.0.0
  description: Gestion des livres et des emprunts
servers:
  - url: https://api.hei.school/v1
  - url: https://staging.hei.school/v2
    description: Environnement de test

paths:
  /livres:
    get:
      summary: Lister les livres
      parameters:
        - name: page
          in: query
          required: false
          description: Numero de la page a recuperer
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          description: Nombre maximum de livres par page
          schema: 
            type: integer
            default: 20
      responses:
        '200':
          description: Liste des livres
  /livres/{id}:
    get:
      summary: Lire un livre
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Livre trouve
        '404':
          description: Livre introuvable
