openapi: 3.0.3
info:
      title: API Bibliotheque HEI
      version: 1.0.0
      description: Gestion des livres et des emprunts
servers:
      - url: https://api.hei.school/v1
      - url: https://staging.hei.school/v2
        description: Environnement de test
security:
      - bearerAuth: []
components:
      securitySchemes:
            bearerAuth:
                  type: http
                  scheme: bearer
                  bearerFormat: JWT
      schemas:
            Livre:
                  type: object
                  properties:
                        id:
                              type: integer
                              example: 19
                        titre:
                              type: string
                              required: true
                              example: Vakivakim-piainana
                        auteur:
                              type: string
                              example: Iharilanto Patrick Andriamangatiana
            Erreur:
                  type: object
                  properties:
                        type:
                              type: string
                              example: "https://api.hei.school/errors/not-found"
                        title:
                              type: string
                              example: Ressource introuvable
                        status:
                              type: integer
                              example: 404
                        detail:
                              type: string
                              example: Le livre demande n'existe pas.
            Emprunt:
                  type: object
                  properties:
                        id:
                              type: integer
                              example: 7
                        livreId:
                              type: integer
                              example: 42
                        dateEmprunt:
                              type: string
                              format: date
                              example: "2026-07-01"
                        dateRetour:
                              type: string
                              format: date
                              example: "2026-07-19"

paths:
      /livres:
            get:
                  summary: Lister les livres
                  parameters:
                        - name: page
                          in: query
                          required: false
                          description: Numero de la page a recuperer
                          schema:
                                type: integer
                                default: 1
                        - name: limit
                          in: query
                          required: false
                          description: Nombre maximum de livres par page
                          schema:
                                type: integer
                                default: 20
                  responses:
                        "200":
                              description: Liste des livres
            post:
                  summary: Creer un livre
                  requestBody:
                        required: true
                        content:
                              application/json:
                                    schema:
                                          type: array
                                          items:
                                                $ref: "#/components/schemas/Livre"
                  responses:
                        "201":
                              description: Livre cree
                        "422":
                              description: Donnees invalides
                              content:
                                    application/json:
                                          schema:
                                                $ref: "#/components/schemas/Erreur"
      /livres/{id}:
            get:
                  summary: Lire un livre
                  parameters:
                        - name: id
                          in: path
                          required: true
                          schema:
                                type: integer
                  responses:
                        "200":
                              description: Livre trouve
                        "404":
                              description: Livre introuvable
                              content:
                                    application/json:
                                          schema:
                                                $ref: "#/components/schemas/Erreur"
            put:
                  summary: Remplacer un livre
                  parameters:
                        - name: id
                          in: path
                          required: true
                          schema:
                                type: integer
                  requestBody:
                        required: true
                        content:
                              application/json:
                                    schema:
                                          type: object
                                          required:
                                                - titre
                                          properties:
                                                titre:
                                                      type: string
                                                auteur:
                                                      type: string
                  responses:
                        "200":
                              description: Livre remplace
                        "404":
                              description: Livre introuvable
                              content:
                                    application/json:
                                          schema:
                                                $ref: "#/components/schemas/Erreur"
                        "422":
                              description: Donnees invalides
                              content:
                                    application/json:
                                          schema:
                                                $ref: "#/components/schemas/Erreur"
            patch:
                  summary: Modifier un livre
                  parameters:
                        - name: id
                          in: path
                          required: true
                          schema:
                                type: integer
                  requestBody:
                        required: false
                        content:
                              application/json:
                                    schema:
                                          type: object
                                          properties:
                                                titre:
                                                      type: string
                                                auteur:
                                                      type: string
                  responses:
                        "200":
                              description: Livre modifie
                        "404":
                              description: Livre introuvable
                              content:
                                    application/json:
                                          schema:
                                                $ref: "#/components/schemas/Erreur"
                        "422":
                              description: Donnees invalides
                              content:
                                    application/json:
                                          schema:
                                                $ref: "#/components/schemas/Erreur"
            delete:
                  summary: Supprimer un livre
                  parameters:
                        - name: id
                          in: path
                          required: true
                          schema:
                                type: integer
                  responses:
                        "204":
                              description: Livre supprime
                        "404":
                              description: Livre introuvable
                              content:
                                    application/json:
                                          schema:
                                                $ref: "#/components/schemas/Erreur"
      /livres/{id}/emprunts:
            get:
                  summary: Lister les emprunts d'un livre
                  parameters:
                        - name: id
                          in: path
                          required: true
                          schema:
                                type: integer
                  responses:
                        "200":
                              description: Liste des emprunts du livre
                              content:
                                    application/json:
                                          schema:
                                                type: array
                                                items:
                                                      $ref: "#/components/schemas/Emprunt"
                        "404":
                              description: Liste introuvable
                              content:
                                    application/json:
                                          schema:
                                                $ref: "#/components/schemas/Emprunt"
      /emprunts:
            post:
                  summary: Creer un emprunt
                  requestBody:
                        required: true
                        content:
                              application/json:
                                    schema:
                                          $ref: "#/components/schemas/Emprunt"
                  responses:
                        "201":
                              description: Emprunt cree
                              content:
                                    application/json:
                                          schema:
                                                $ref: "#/components/schemas/Emprunt"
                        "402":
                              description: Donnees invalides
                              content:
                                    application/json:
                                          schema:
                                                $ref: "#/components/schemas/Emprunt"
